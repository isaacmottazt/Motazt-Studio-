<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Privada — Motazt Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
        }

        /* ===== TELA DE LOGIN ===== */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #d6a04c;
        }

        .login-header p {
            font-size: 14px;
            color: #999;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #ddd;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: #d6a04c;
            box-shadow: 0 0 20px rgba(214, 160, 76, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #d6a04c 0%, #c9933d 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(214, 160, 76, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(255, 67, 67, 0.15);
            border: 1px solid rgba(255, 67, 67, 0.3);
            color: #ff4343;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== GALERIA ===== */
        .galeria-screen {
            display: none;
        }

        .galeria-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .galeria-info h1 {
            font-size: 32px;
            font-weight: 700;
            color: #d6a04c;
            margin-bottom: 8px;
        }

        .galeria-info p {
            font-size: 14px;
            color: #999;
        }

        .galeria-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #ccc;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: rgba(214, 160, 76, 0.2);
            border-color: #d6a04c;
            color: #d6a04c;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon {
            font-size: 24px;
        }

        .stat-content h3 {
            font-size: 12px;
            font-weight: 500;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-content p {
            font-size: 20px;
            font-weight: 700;
            color: #d6a04c;
        }

        .filtros {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filtro-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ccc;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .filtro-btn.active {
            background: #d6a04c;
            color: #000;
            border-color: #d6a04c;
        }

        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .foto-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            group: "foto";
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .foto-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(214, 160, 76, 0.2);
        }

        .foto-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .foto-card:hover .foto-img {
            transform: scale(1.05);
        }

        .foto-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .foto-card:hover .foto-overlay {
            opacity: 1;
        }

        .overlay-btn {
            width: 44px;
            height: 44px;
            background: #d6a04c;
            border: none;
            border-radius: 50%;
            color: #000;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .overlay-btn:hover {
            transform: scale(1.1);
        }

        .foto-favorita {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .foto-favorita:hover {
            background: rgba(214, 160, 76, 0.8);
        }

        .foto-favorita.selecionada {
            color: #d6a04c;
            background: rgba(214, 160, 76, 0.3);
        }

        /* ===== MODAL VISUALIZAÇÃO ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal.ativo {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .modal-img {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 12px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: #d6a04c;
            color: #000;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(214, 160, 76, 0.8);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-nav:hover {
            background: #d6a04c;
        }

        .modal-nav.prev {
            left: 20px;
        }

        .modal-nav.next {
            right: 20px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 10px 20px;
            background: #d6a04c;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(214, 160, 76, 0.3);
        }

        /* ===== SEÇÃO DE ENTREGA ===== */
        .entrega-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .entrega-title {
            font-size: 16px;
            font-weight: 600;
            color: #d6a04c;
            margin-bottom: 16px;
        }

        .entrega-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .entrega-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .entrega-icon {
            font-size: 24px;
        }

        .entrega-info h3 {
            font-size: 13px;
            font-weight: 600;
            color: #ddd;
            margin-bottom: 4px;
        }

        .entrega-info p {
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 768px) {
            .galeria-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .login-card {
                padding: 30px 20px;
            }

            .galeria-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== TELA DE LOGIN ===== -->
        <div id="loginScreen" class="login-screen">
            <div class="login-card">
                <div class="login-header">
                    <h1>🔐 Sua Galeria</h1>
                    <p>Digite a senha para acessar suas fotos</p>
                </div>

                <div id="errorMsg" class="error-message"></div>

                <form onsubmit="acessarGaleria(event)">
                    <div class="form-group">
                        <label for="senha">Senha da Galeria</label>
                        <input 
                            type="password" 
                            id="senha" 
                            placeholder="Digite a senha de acesso"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-login">Acessar Galeria</button>
                </form>
            </div>
        </div>

        <!-- ===== GALERIA ===== -->
        <div id="galeiaScreen" class="galeria-screen">
            <div class="galeria-header">
                <div class="galeria-info">
                    <h1>Suas Fotos</h1>
                    <p>Ensaio realizado em 15 de Julho de 2026</p>
                </div>

                <div class="galeria-controls">
                    <button class="btn-icon" title="Baixar todas" onclick="baixarTodasFotos()">📥</button>
                    <button class="btn-icon" title="Compartilhar" onclick="compartilharGaleria()">📤</button>
                    <button class="btn-icon" title="Sair" onclick="fazerLogout()">🚪</button>
                </div>
            </div>

            <!-- STATS -->
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-icon">📊</span>
                    <div class="stat-content">
                        <h3>Total</h3>
                        <p id="totalFotos">120</p>
                    </div>
                </div>

                <div class="stat-item">
                    <span class="stat-icon">⭐</span>
                    <div class="stat-content">
                        <h3>Favoritas</h3>
                        <p id="totalFavoritas">0</p>
                    </div>
                </div>

                <div class="stat-item">
                    <span class="stat-icon">✅</span>
                    <div class="stat-content">
                        <h3>Status</h3>
                        <p>Finalizadas</p>
                    </div>
                </div>
            </div>

            <!-- FILTROS -->
            <div class="filtros">
                <button class="filtro-btn active" onclick="filtrarFotos('todas', this)">Todas (120)</button>
                <button class="filtro-btn" onclick="filtrarFotos('favoritas', this)">Favoritas (0)</button>
                <button class="filtro-btn" onclick="filtrarFotos('parcial', this)">Entrega Parcial (40)</button>
                <button class="filtro-btn" onclick="filtrarFotos('final', this)">Entrega Final (80)</button>
            </div>

            <!-- GALERIA GRID -->
            <div class="galeria-grid" id="galeiaGrid">
                <!-- Fotos carregadas via JS -->
            </div>

            <!-- SEÇÃO DE ENTREGA -->
            <div class="entrega-section">
                <div class="entrega-title">📦 Status de Entrega</div>
                <div class="entrega-grid">
                    <div class="entrega-item">
                        <span class="entrega-icon">📸</span>
                        <div class="entrega-info">
                            <h3>Entrega Parcial</h3>
                            <p>40 fotos editadas</p>
                        </div>
                    </div>

                    <div class="entrega-item">
                        <span class="entrega-icon">✨</span>
                        <div class="entrega-info">
                            <h3>Entrega Final</h3>
                            <p>80 fotos adicionais</p>
                        </div>
                    </div>

                    <div class="entrega-item">
                        <span class="entrega-icon">⏳</span>
                        <div class="entrega-info">
                            <h3>Próxima Atualização</h3>
                            <p>15 de Agosto</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE VISUALIZAÇÃO -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="fecharModal()">&times;</button>
            <button class="modal-nav prev" onclick="fotoAnterior()">‹</button>
            <img id="modalImg" class="modal-img" src="" alt="">
            <button class="modal-nav next" onclick="proximaFoto()">›</button>

            <div class="modal-footer">
                <button class="modal-btn" onclick="baixarFotoAtual()">📥 Baixar</button>
                <button class="modal-btn" onclick="marcarFavoritaAtual()">⭐ Favorita</button>
            </div>
        </div>
    </div>

    <script>
        const SENHA_CORRETA = 'motazt2024'; // Em produção, gerar hash no servidor
        let fotoAtual = 0;
        let todasFotos = [];
        let fotosAtivas = [];
        let favoritas = new Set(JSON.parse(localStorage.getItem('favoritas') || '[]'));

        // Gerar fotos de exemplo (em produção, viriam do servidor)
        function gerarFotosExemplo() {
            const fotos = [];
            for (let i = 1; i <= 120; i++) {
                fotos.push({
                    id: i,
                    url: `https://picsum.photos/500/500?random=${i}`,
                    tipo: i <= 40 ? 'parcial' : 'final',
                    data: '2026-07-15'
                });
            }
            return fotos;
        }

        function acessarGaleria(e) {
            e.preventDefault();
            const senha = document.getElementById('senha').value;

            if (senha === SENHA_CORRETA) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('galeiaScreen').style.display = 'block';
                todasFotos = gerarFotosExemplo();
                fotosAtivas = todasFotos;
                renderizarGaleria();
                atualizarStats();
            } else {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = '❌ Senha incorreta. Tente novamente.';
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        }

        function renderizarGaleria() {
            const grid = document.getElementById('galeiaGrid');
            grid.innerHTML = '';

            fotosAtivas.forEach((foto, idx) => {
                const card = document.createElement('div');
                card.className = 'foto-card';
                card.innerHTML = `
                    <img src="${foto.url}" alt="Foto ${foto.id}" class="foto-img" loading="lazy">
                    <div class="foto-overlay">
                        <button class="overlay-btn" onclick="abrirModal(${idx})">👁️</button>
                        <button class="overlay-btn" onclick="baixarFoto('${foto.url}')">📥</button>
                    </div>
                    <button class="foto-favorita ${favoritas.has(foto.id) ? 'selecionada' : ''}" 
                            onclick="toggleFavorita(${foto.id}, event)">
                        ${favoritas.has(foto.id) ? '⭐' : '☆'}
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function filtrarFotos(tipo, botaoClicado) {
            document.querySelectorAll('.filtro-btn').forEach(btn => btn.classList.remove('active'));
            const btnAlvo = botaoClicado || (typeof event !== 'undefined' ? event.target : null);
            if (btnAlvo) btnAlvo.classList.add('active');

            if (tipo === 'todas') {
                fotosAtivas = todasFotos;
            } else if (tipo === 'favoritas') {
                fotosAtivas = todasFotos.filter(f => favoritas.has(f.id));
            } else {
                fotosAtivas = todasFotos.filter(f => f.tipo === tipo);
            }

            fotoAtual = 0;
            renderizarGaleria();
            atualizarStats();
        }

        function toggleFavorita(id, e) {
            e.stopPropagation();
            if (favoritas.has(id)) {
                favoritas.delete(id);
            } else {
                favoritas.add(id);
            }
            localStorage.setItem('favoritas', JSON.stringify(Array.from(favoritas)));
            renderizarGaleria();
            atualizarStats();
        }

        function abrirModal(idx) {
            fotoAtual = idx;
            document.getElementById('modal').classList.add('ativo');
            atualizarModal();
        }

        function fecharModal() {
            document.getElementById('modal').classList.remove('ativo');
        }

        function atualizarModal() {
            const foto = fotosAtivas[fotoAtual];
            document.getElementById('modalImg').src = foto.url;
        }

        function proximaFoto() {
            fotoAtual = (fotoAtual + 1) % fotosAtivas.length;
            atualizarModal();
        }

        function fotoAnterior() {
            fotoAtual = (fotoAtual - 1 + fotosAtivas.length) % fotosAtivas.length;
            atualizarModal();
        }

        function marcarFavoritaAtual() {
            const foto = fotosAtivas[fotoAtual];
            toggleFavorita(foto.id, { stopPropagation: () => {} });
        }

        async function baixarFoto(url) {
            try {
                // Em produção, usar blob + compressão
                const link = document.createElement('a');
                link.href = url;
                link.download = `motazt-${Date.now()}.jpg`;
                link.click();
            } catch (error) {
                alert('Erro ao baixar foto');
            }
        }

        function baixarFotoAtual() {
            baixarFoto(fotosAtivas[fotoAtual].url);
        }

        async function baixarTodasFotos() {
            alert('Iniciando download de todas as fotos (este pode levar alguns minutos)...');
            // Em produção, usar blob + compressão + zip
            for (let foto of fotosAtivas) {
                await baixarFoto(foto.url);
            }
        }

        function compartilharGaleria() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({
                    title: 'Minha Galeria Motazt',
                    text: 'Confira minhas fotos do ensaio!',
                    url: url
                });
            } else {
                alert('Link copiado: ' + url);
            }
        }

        function atualizarStats() {
            document.getElementById('totalFotos').textContent = fotosAtivas.length;
            document.getElementById('totalFavoritas').textContent = favoritas.size;
        }

        function fazerLogout() {
            if (confirm('Sair da galeria?')) {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('galeiaScreen').style.display = 'none';
                document.getElementById('senha').value = '';
                favoritas.clear();
                localStorage.removeItem('favoritas');
            }
        }

        // Fechar modal com Esc
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') fecharModal();
            if (e.key === 'ArrowRight') proximaFoto();
            if (e.key === 'ArrowLeft') fotoAnterior();
        });
    </script>
</body>
</html>
