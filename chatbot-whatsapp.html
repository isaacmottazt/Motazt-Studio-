<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — Motazt Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            max-height: 700px;
            background: rgba(20, 20, 20, 0.95);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #d6a04c 0%, #c9933d 100%);
            padding: 16px 20px;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-text h3 {
            font-size: 14px;
            font-weight: 600;
        }

        .header-text p {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 2px;
        }

        .btn-close {
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 50%;
            color: #000;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .btn-close:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.usuario {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.bot .message-content {
            background: rgba(255, 255, 255, 0.1);
            border-left: 3px solid #d6a04c;
        }

        .message.usuario .message-content {
            background: #d6a04c;
            color: #000;
        }

        .message-time {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            text-align: center;
        }

        /* SUGESTÕES RÁPIDAS */
        .quick-replies {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 8px 0;
        }

        .quick-reply-btn {
            padding: 10px 12px;
            background: rgba(214, 160, 76, 0.15);
            border: 1px solid rgba(214, 160, 76, 0.3);
            color: #d6a04c;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            text-align: left;
        }

        .quick-reply-btn:hover {
            background: rgba(214, 160, 76, 0.25);
            border-color: #d6a04c;
        }

        /* OPÇÕES MÚLTIPLAS */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 8px 0;
        }

        .option-btn {
            padding: 12px;
            background: rgba(214, 160, 76, 0.15);
            border: 1px solid rgba(214, 160, 76, 0.3);
            color: #d6a04c;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background: rgba(214, 160, 76, 0.25);
            border-color: #d6a04c;
        }

        /* INDICADOR DE DIGITAÇÃO */
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #d6a04c;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 8px 14px;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            outline: none;
        }

        .chat-input::placeholder {
            color: #666;
        }

        .btn-send {
            width: 36px;
            height: 36px;
            background: #d6a04c;
            border: none;
            border-radius: 50%;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .btn-send:hover {
            background: #c9933d;
            transform: scale(1.05);
        }

        .btn-send:active {
            transform: scale(0.95);
        }

        /* BADGE STATUS */
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 4px;
        }

        @media (max-width: 480px) {
            .chat-container {
                max-height: 100vh;
                height: 100vh;
                border-radius: 0;
            }

            .message-content {
                max-width: 85%;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- HEADER -->
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="avatar">📸</div>
                <div class="header-text">
                    <h3>Motazt Studio</h3>
                    <p>🟢 Online</p>
                </div>
            </div>
            <button class="btn-close" onclick="fecharChat()">×</button>
        </div>

        <!-- MENSAGENS -->
        <div class="chat-messages" id="chatMessages">
            <!-- Carregadas dinamicamente -->
        </div>

        <!-- INPUT -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="chat-input" 
                    id="inputMsg" 
                    placeholder="Digite sua mensagem..."
                    onkeypress="enviarSeEnter(event)"
                >
            </div>
            <button class="btn-send" onclick="enviarMensagem()">📤</button>
        </div>
    </div>

    <script>
        // ===== BOT DE CONVERSAÇÃO =====
        class ChatbotMotazt {
            constructor() {
                this.conversas = [];
                this.mensagens = [];
                this.usuarioInfo = {};
                this.fluxo = 'menu_inicial';
            }

            /**
             * Inicia chat com mensagem de boas-vindas
             */
            iniciar() {
                this.carregarHistorico();
                
                if (this.mensagens.length === 0) {
                    this.enviarMensagem({
                        texto: `Olá! 👋 Bem-vindo ao Motazt Studio!\n\nCom o que posso ajudar?`,
                        tipo: 'bot'
                    });

                    setTimeout(() => {
                        this.mostrarOpcoes([
                            { id: 'info', label: '📸 Saber mais sobre nossos serviços' },
                            { id: 'valores', label: '💰 Conhecer valores' },
                            { id: 'agendar', label: '📅 Agendar agora' },
                            { id: 'faq', label: '❓ Dúvidas frequentes' }
                        ]);
                    }, 500);
                }

                this.renderizar();
            }

            /**
             * Processa respostas do usuário
             */
            processarResposta(entrada) {
                // Adiciona mensagem do usuário
                this.enviarMensagem({
                    texto: entrada,
                    tipo: 'usuario'
                });

                // Simula delay de digitação
                setTimeout(() => {
                    this.gerarResposta(entrada);
                }, 800);
            }

            /**
             * Gera resposta baseada no contexto
             */
            gerarResposta(entrada) {
                const entrada_lower = entrada.toLowerCase();

                // Tenta match com palavras-chave
                if (entrada_lower.includes('valor') || entrada_lower.includes('preço') || entrada_lower.includes('quanto')) {
                    this.fluxo = 'valores';
                    this.responderValores();
                } 
                else if (entrada_lower.includes('casamento') || entrada_lower.includes('wedding')) {
                    this.fluxo = 'tipo_ensaio';
                    this.responderCasamento();
                }
                else if (entrada_lower.includes('individual') || entrada_lower.includes('retrato')) {
                    this.fluxo = 'tipo_ensaio';
                    this.responderIndividual();
                }
                else if (entrada_lower.includes('agendar') || entrada_lower.includes('booking')) {
                    this.fluxo = 'agendamento';
                    this.ofrecerAgendamento();
                }
                else if (entrada_lower.includes('cancelamento') || entrada_lower.includes('cancelar')) {
                    this.responderCancelamento();
                }
                else if (entrada_lower.includes('quanto tempo') || entrada_lower.includes('entrega')) {
                    this.responderEntrega();
                }
                else if (entrada_lower.includes('oi') || entrada_lower.includes('olá') || entrada_lower.includes('opa')) {
                    this.responderSaudacao();
                }
                else {
                    this.responderDuvida(entrada);
                }
            }

            responderSaudacao() {
                this.enviarMensagem({
                    texto: '😊 Oi! Tudo bem?\n\nComo posso ajudar?',
                    tipo: 'bot'
                });

                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'info', label: '📸 Serviços' },
                        { id: 'valores', label: '💰 Valores' },
                        { id: 'agendar', label: '📅 Agendar' }
                    ]);
                }, 500);
            }

            responderValores() {
                this.enviarMensagem({
                    texto: `💰 Nossos Valores\n\n✅ Ensaio Individual: R$ 300-500\n✅ Casal: R$ 400-600\n✅ Familiar: R$ 500-800\n✅ Casamento: Sob consulta\n✅ Gestante: R$ 350-550\n✅ Evento: R$ 800-2000\n\nOs preços variam conforme a duração, local e pacote escolhido.`,
                    tipo: 'bot'
                });

                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'agendar', label: '📅 Quer agendar?' },
                        { id: 'pacotes', label: '📦 Ver pacotes' },
                        { id: 'menu', label: '🏠 Voltar ao menu' }
                    ]);
                }, 500);
            }

            responderCasamento() {
                this.enviarMensagem({
                    texto: `💍 Casamento\n\nNosso pacote completo inclui:\n✅ Cobertura de 8 horas\n✅ Edição profissional de todas as fotos\n✅ Álbum digital\n✅ Prévias em 48h\n✅ Fotos finalizadas em 30 dias\n✅ Direito de impressão ilimitado\n\nValor: Sob consulta (depende do escopo)`,
                    tipo: 'bot'
                });

                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'agendar', label: '📅 Agendar consulta' },
                        { id: 'galeria', label: '🖼️ Ver galeria' },
                        { id: 'menu', label: '🏠 Menu' }
                    ]);
                }, 500);
            }

            responderIndividual() {
                this.enviarMensagem({
                    texto: `👤 Ensaio Individual\n\nPerfecto para:\n✅ Redes sociais e portfólio\n✅ Fotos profissionais\n✅ Cartão de visita\n✅ LinkedIn\n✅ Presentes especiais\n\nDuração: 1h30min a 2h\nValor: R$ 300-500\nEdição incluída!\n\nDesde a primeira hora, você já leva as fotos prontas.`,
                    tipo: 'bot'
                });

                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'agendar', label: '📅 Agendar agora' },
                        { id: 'galeria', label: '🖼️ Ver exemplos' }
                    ]);
                }, 500);
            }

            responderEntrega() {
                this.enviarMensagem({
                    texto: `⏳ Tempo de Entrega\n\n📸 Prévias (Seleta)\n→ 24-48 horas\n\n✨ Entrega Parcial (50% fotos)\n→ 7-10 dias\n\n🎉 Entrega Final (100% fotos)\n→ 20-30 dias\n\nTodas as fotos recebem edição profissional!\n\nVocê acompanha tudo pela sua galeria privada.`,
                    tipo: 'bot'
                });

                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'agendar', label: '📅 Ótimo! Vou agendar' },
                        { id: 'menu', label: '🏠 Voltar' }
                    ]);
                }, 500);
            }

            responderCancelamento() {
                this.enviarMensagem({
                    texto: `📋 Política de Cancelamento\n\n✅ Até 24h antes: REEMBOLSO TOTAL\n⚠️ Menos de 24h: MULTA de 30-50%\n\nOpciones de reembolso:\n💳 Crédito no cartão (5-7 dias)\n🔄 PIX (2-3 dias)\n🎁 Crédito para futuro agendamento\n\nVocê pode reagendar sem multa se avisar com antecedência!`,
                    tipo: 'bot'
                });

                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'agendar', label: '📅 Agendar' },
                        { id: 'menu', label: '🏠 Menu' }
                    ]);
                }, 500);
            }

            ofrecerAgendamento() {
                this.enviarMensagem({
                    texto: `📅 Perfeito!\n\nPara agendar seu ensaio, clique no botão abaixo e preencha o formulário rápido.\n\nDúvidas durante o agendamento? Estarei aqui! 😊`,
                    tipo: 'bot'
                });

                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'go_form', label: '→ Ir para Formulário', link: 'form.html' },
                        { id: 'menu', label: 'Mais dúvidas' }
                    ]);
                }, 500);
            }

            responderDuvida(entrada) {
                this.mostrarIndicadorDigitacao();

                // Simula processamento
                setTimeout(() => {
                    this.apagarIndicadorDigitacao();
                    
                    this.enviarMensagem({
                        texto: `Que legal! 🤔\n\n"${entrada}"\n\nSe não conseguir encontrar a resposta aqui, deixe sua mensagem e nossa equipe responde em até 2 horas!\n\n📧 Email: contato@motaztstudio.com\n📱 WhatsApp: [link direto]`,
                        tipo: 'bot'
                    });

                    setTimeout(() => {
                        this.mostrarOpcoes([
                            { id: 'agendar', label: '📅 Agendar' },
                            { id: 'menu', label: '🏠 Menu' },
                            { id: 'whatsapp', label: '💬 Falar no WhatsApp', link: 'https://wa.me/5585999999999' }
                        ]);
                    }, 500);
                }, 1500);
            }

            /**
             * UI Helpers
             */
            enviarMensagem(msg) {
                this.mensagens.push({
                    ...msg,
                    timestamp: new Date()
                });
                this.salvarHistorico();
                this.renderizar();
            }

            mostrarOpcoes(opcoes) {
                const optionsHtml = opcoes.map(op => `
                    <button class="quick-reply-btn" onclick="chatbot.selecionarOpcao('${op.id}', '${op.label}', '${op.link || ''}')" 
                            style="display: block; width: 100%; margin: 4px 0;">
                        ${op.label}
                    </button>
                `).join('');

                const div = document.createElement('div');
                div.innerHTML = optionsHtml;
                document.getElementById('chatMessages').appendChild(div);
                this.scrollParaFinal();
            }

            mostrarIndicadorDigitacao() {
                const div = document.createElement('div');
                div.className = 'message bot';
                div.innerHTML = `
                    <div class="typing-indicator" id="typingIndicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
                document.getElementById('chatMessages').appendChild(div);
                this.scrollParaFinal();
            }

            apagarIndicadorDigitacao() {
                const indicator = document.getElementById('typingIndicator');
                if (indicator) {
                    indicator.closest('.message').remove();
                }
            }

            selecionarOpcao(id, label, link) {
                // Remove botões anteriores
                document.querySelectorAll('.quick-reply-btn').forEach(btn => btn.remove());

                if (link && link.startsWith('http')) {
                    window.open(link, '_blank');
                    return;
                }

                if (link && link.endsWith('.html')) {
                    window.location.href = link;
                    return;
                }

                this.processarResposta(label);
            }

            /**
             * Storage
             */
            salvarHistorico() {
                localStorage.setItem('chatHistorico', JSON.stringify(this.mensagens));
            }

            carregarHistorico() {
                const saved = localStorage.getItem('chatHistorico');
                this.mensagens = saved ? JSON.parse(saved) : [];
            }

            limparHistorico() {
                this.mensagens = [];
                localStorage.removeItem('chatHistorico');
                this.renderizar();
                this.iniciar();
            }

            /**
             * Renderização
             */
            renderizar() {
                const container = document.getElementById('chatMessages');
                container.innerHTML = '';

                this.mensagens.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.tipo}`;

                    const hora = new Date(msg.timestamp).toLocaleTimeString('pt-BR', { 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    });

                    div.innerHTML = `
                        <div class="message-content">${this.escapeHtml(msg.texto)}</div>
                        <div class="message-time">${hora}</div>
                    `;

                    container.appendChild(div);
                });

                this.scrollParaFinal();
            }

            scrollParaFinal() {
                const container = document.getElementById('chatMessages');
                container.scrollTop = container.scrollHeight;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML.replace(/\n/g, '<br>');
            }
        }

        // ===== INSTÂNCIA GLOBAL =====
        const chatbot = new ChatbotMotazt();

        function enviarMensagem() {
            const input = document.getElementById('inputMsg');
            const texto = input.value.trim();

            if (texto) {
                chatbot.processarResposta(texto);
                input.value = '';
            }
        }

        function enviarSeEnter(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                enviarMensagem();
            }
        }

        function fecharChat() {
            if (confirm('Fechar chat?')) {
                window.close();
            }
        }

        // Iniciar
        window.addEventListener('DOMContentLoaded', () => {
            chatbot.iniciar();
        });
    </script>
</body>
</html>
