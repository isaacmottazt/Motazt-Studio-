<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — Motazt Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e0b73f;
            --primary-dark: #a8801f;
            --primary-light: #f4d374;
            --dark: #0f0f0f;
            --darker: #000;
            --light: #f5f5f5;
            --gray: #2a2a2a;
            --gray-light: #3a3a3a;
            --text: #e0e0e0;
            --text-muted: #999;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--darker);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            max-height: 700px;
            background: var(--dark);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(224, 183, 63, 0.15);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 14px 16px;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(0,0,0,0.2);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-text h3 {
            font-size: 14px;
            font-weight: 600;
        }

        .header-text p {
            font-size: 11px;
            font-weight: 500;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.online { background: #1f9d55; }
        .status-dot.offline { background: #8a8a8a; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-icon {
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.15);
            border: none;
            border-radius: 50%;
            color: #000;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: rgba(0, 0, 0, 0.28);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--dark);
        }

        .message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.25s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot { justify-content: flex-start; }
        .message.usuario { justify-content: flex-end; }

        .message-content {
            max-width: 74%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.45;
            word-wrap: break-word;
        }

        .message.bot .message-content {
            background: var(--gray);
            border-left: 3px solid var(--primary);
        }

        .message.usuario .message-content {
            background: var(--primary);
            color: #000;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 3px;
            align-self: flex-end;
        }

        .system-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin: 4px 0;
        }

        /* SUGESTÕES RÁPIDAS */
        .quick-replies-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 2px 0 8px 0;
        }

        .quick-reply-btn {
            padding: 10px 12px;
            background: rgba(224, 183, 63, 0.1);
            border: 1px solid rgba(224, 183, 63, 0.35);
            color: var(--primary-light);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            text-align: left;
            width: 100%;
        }

        .quick-reply-btn:hover {
            background: rgba(224, 183, 63, 0.22);
            border-color: var(--primary);
        }

        .quick-reply-btn.human {
            border-style: dashed;
        }

        /* INDICADOR DE DIGITAÇÃO */
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 10px 14px;
            background: var(--gray);
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .chat-input-area {
            padding: 14px 16px;
            border-top: 1px solid rgba(224, 183, 63, 0.12);
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--dark);
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--gray);
            border: 1px solid rgba(224, 183, 63, 0.2);
            border-radius: 20px;
            padding: 8px 14px;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            outline: none;
        }

        .chat-input::placeholder { color: var(--text-muted); }

        .btn-send {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn-send:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .btn-send:active { transform: scale(0.95); }

        /* Contact capture form dentro do chat */
        .contact-form {
            background: var(--gray);
            border: 1px solid rgba(224, 183, 63, 0.3);
            border-radius: 10px;
            padding: 12px;
            margin: 2px 0 8px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .contact-form label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .contact-form input {
            background: var(--dark);
            border: 1px solid rgba(224, 183, 63, 0.25);
            border-radius: 6px;
            padding: 8px 10px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            outline: none;
        }

        .contact-form input:focus { border-color: var(--primary); }

        .contact-form button {
            margin-top: 2px;
            padding: 9px;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
        }

        .contact-form button:hover { background: var(--primary-dark); }
        .contact-form .erro { color: #e77; font-size: 11px; }

        @media (max-width: 480px) {
            .chat-container {
                max-height: 100vh;
                height: 100vh;
                border-radius: 0;
            }
            .message-content { max-width: 85%; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(224, 183, 63, 0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(224, 183, 63, 0.3); }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- HEADER -->
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="avatar"><img src="img/logo.png" alt="Motazt Studio"></div>
                <div class="header-text">
                    <h3>Motazt Studio</h3>
                    <p><span class="status-dot" id="statusDot"></span><span id="statusTexto">Online</span></p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" onclick="chatbot.reiniciarConversa()" title="Reiniciar conversa">↻</button>
                <button class="btn-icon" onclick="fecharChat()" title="Fechar">×</button>
            </div>
        </div>

        <!-- MENSAGENS -->
        <div class="chat-messages" id="chatMessages"></div>

        <!-- INPUT -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input
                    type="text"
                    class="chat-input"
                    id="inputMsg"
                    placeholder="Digite sua mensagem..."
                    onkeypress="enviarSeEnter(event)"
                >
            </div>
            <button class="btn-send" onclick="enviarMensagem()" title="Enviar">➤</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        /* ======================================
           SUPABASE (mesmas credenciais do resto do site)
           Usado para gravar contatos capturados no fallback,
           para que a promessa "nossa equipe responde em 2h"
           realmente chegue em algum lugar.
        ====================================== */
        const SUPABASE_URL = "https://tbwmsgztpyyratambgqs.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_yqH30kXsSD7nmwdlgPj93Q_pw1QrcQd";
        let supabaseClient = null;
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (e) {
            console.warn('Supabase indisponível no chatbot:', e);
        }

        /* ======================================
           HORÁRIO DE ATENDIMENTO
           Mesma janela usada no form.js (07:00–22:00, todos os dias).
           Ajuste aqui se o horário real do estúdio mudar.
        ====================================== */
        const HORARIO_ATENDIMENTO = { abreHora: 7, fechaHora: 22 };

        function dentroDoHorario() {
            const agora = new Date();
            const hora = agora.getHours();
            return hora >= HORARIO_ATENDIMENTO.abreHora && hora < HORARIO_ATENDIMENTO.fechaHora;
        }

        function atualizarStatusOnline() {
            const online = dentroDoHorario();
            const dot = document.getElementById('statusDot');
            const texto = document.getElementById('statusTexto');
            if (online) {
                dot.className = 'status-dot online';
                texto.textContent = 'Online';
            } else {
                dot.className = 'status-dot offline';
                texto.textContent = `Fora do horário — retornamos às ${String(HORARIO_ATENDIMENTO.abreHora).padStart(2,'0')}h`;
            }
        }

        // ===== BOT DE CONVERSAÇÃO =====
        class ChatbotMotazt {
            constructor() {
                this.mensagens = [];
                this.fluxo = 'menu_inicial';
                this.tipoEnsaioEscolhido = null; // usado para pré-preencher o formulário
                this.aguardandoContato = false;
                this.perguntaOriginal = null;
            }

            iniciar() {
                atualizarStatusOnline();
                this.carregarHistorico();

                const visitaAnterior = localStorage.getItem('motaztChatVisitou') === '1';

                if (this.mensagens.length === 0) {
                    if (visitaAnterior) {
                        this.enviarMensagem({
                            texto: `Bem-vindo de volta! Com o que posso ajudar hoje?`,
                            tipo: 'bot'
                        });
                    } else {
                        this.enviarMensagem({
                            texto: `Olá! Bem-vindo ao Motazt Studio.\n\nCom o que posso ajudar?`,
                            tipo: 'bot'
                        });
                    }

                    setTimeout(() => {
                        this.mostrarOpcoes([
                            { id: 'info', label: 'Saber mais sobre nossos serviços' },
                            { id: 'valores', label: 'Conhecer valores' },
                            { id: 'agendar', label: 'Agendar agora' },
                            { id: 'faq', label: 'Dúvidas frequentes' }
                        ], { comHumano: true });
                    }, 500);
                } else {
                    this.mostrarOpcaoHumanoFixa();
                }

                localStorage.setItem('motaztChatVisitou', '1');
                this.renderizar();
            }

            reiniciarConversa() {
                if (!confirm('Reiniciar a conversa? O histórico será apagado.')) return;
                this.mensagens = [];
                this.tipoEnsaioEscolhido = null;
                this.aguardandoContato = false;
                localStorage.removeItem('chatHistorico');
                this.renderizar();
                this.iniciar();
            }

            processarResposta(entrada) {
                if (this.aguardandoContato) {
                    // Se o usuário digitar em vez de usar o formulário de contato,
                    // apenas orienta a preencher o formulário mostrado.
                    this.enviarMensagem({ texto: entrada, tipo: 'usuario' });
                    setTimeout(() => {
                        this.enviarMensagem({
                            texto: `Pode preencher seus dados no formulário acima para que nossa equipe entre em contato.`,
                            tipo: 'bot'
                        });
                    }, 500);
                    return;
                }

                this.enviarMensagem({ texto: entrada, tipo: 'usuario' });

                setTimeout(() => {
                    this.gerarResposta(entrada);
                }, 800);
            }

            gerarResposta(entrada) {
                const e = entrada.toLowerCase();

                if (e.includes('valor') || e.includes('preço') || e.includes('preco') || e.includes('quanto custa')) {
                    this.fluxo = 'valores';
                    this.responderValores();
                }
                else if (e.includes('casamento') || e.includes('wedding')) {
                    this.tipoEnsaioEscolhido = 'Casamento';
                    this.responderCasamento();
                }
                else if (e.includes('individual') || e.includes('retrato')) {
                    this.tipoEnsaioEscolhido = 'Ensaio Individual';
                    this.responderIndividual();
                }
                else if (e.includes('casal')) {
                    this.tipoEnsaioEscolhido = 'Ensaio de Casal';
                    this.responderGenerico('Ensaio de Casal', 'R$ 400-600', '1h30 a 2h');
                }
                else if (e.includes('família') || e.includes('familia')) {
                    this.tipoEnsaioEscolhido = 'Ensaio Familiar';
                    this.responderGenerico('Ensaio Familiar', 'R$ 500-800', '1h30 a 3h');
                }
                else if (e.includes('gestante') || e.includes('grávida') || e.includes('gravida')) {
                    this.tipoEnsaioEscolhido = 'Gestante';
                    this.responderGenerico('Gestante', 'R$ 350-550', '1h a 2h');
                }
                else if (e.includes('agendar') || e.includes('booking') || e.includes('marcar')) {
                    this.fluxo = 'agendamento';
                    this.ofrecerAgendamento();
                }
                else if (e.includes('cancelamento') || e.includes('cancelar')) {
                    this.responderCancelamento();
                }
                else if (e.includes('quanto tempo') || e.includes('entrega') || e.includes('prazo')) {
                    this.responderEntrega();
                }
                else if (e.includes('oi') || e.includes('olá') || e.includes('ola') || e.includes('opa') || e.includes('bom dia') || e.includes('boa tarde') || e.includes('boa noite')) {
                    this.responderSaudacao();
                }
                else {
                    this.responderDuvida(entrada);
                }
            }

            responderSaudacao() {
                this.enviarMensagem({ texto: 'Oi! Tudo bem?\n\nComo posso ajudar?', tipo: 'bot' });
                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'info', label: 'Serviços' },
                        { id: 'valores', label: 'Valores' },
                        { id: 'agendar', label: 'Agendar' }
                    ], { comHumano: true });
                }, 500);
            }

            responderValores() {
                this.enviarMensagem({
                    texto: `Nossos Valores\n\n• Ensaio Individual: R$ 300-500\n• Casal: R$ 400-600\n• Familiar: R$ 500-800\n• Casamento: Sob consulta\n• Gestante: R$ 350-550\n• Evento: R$ 800-2000\n\nOs preços variam conforme duração, local e pacote escolhido.`,
                    tipo: 'bot'
                });
                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'agendar', label: 'Quer agendar?' },
                        { id: 'menu', label: 'Voltar ao menu' }
                    ], { comHumano: true });
                }, 500);
            }

            responderCasamento() {
                this.enviarMensagem({
                    texto: `Casamento\n\nNosso pacote completo inclui:\n• Cobertura de 8 horas\n• Edição profissional de todas as fotos\n• Álbum digital\n• Prévias em 48h\n• Fotos finalizadas em 30 dias\n• Direito de impressão ilimitado\n\nValor: sob consulta (depende do escopo)`,
                    tipo: 'bot'
                });
                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'agendar', label: 'Agendar consulta' },
                        { id: 'galeria', label: 'Ver galeria', link: 'index.html#galeria' },
                        { id: 'menu', label: 'Menu' }
                    ], { comHumano: true });
                }, 500);
            }

            responderIndividual() {
                this.enviarMensagem({
                    texto: `Ensaio Individual\n\nPerfeito para:\n• Redes sociais e portfólio\n• Fotos profissionais\n• Cartão de visita\n• LinkedIn\n• Presentes especiais\n\nDuração: 1h30 a 2h\nValor: R$ 300-500 (edição incluída)`,
                    tipo: 'bot'
                });
                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'agendar', label: 'Agendar agora' },
                        { id: 'galeria', label: 'Ver exemplos', link: 'index.html#galeria' }
                    ], { comHumano: true });
                }, 500);
            }

            responderGenerico(nome, faixa, duracao) {
                this.enviarMensagem({
                    texto: `${nome}\n\nDuração: ${duracao}\nValor: ${faixa} (edição incluída)`,
                    tipo: 'bot'
                });
                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'agendar', label: 'Agendar agora' },
                        { id: 'menu', label: 'Menu' }
                    ], { comHumano: true });
                }, 500);
            }

            responderEntrega() {
                this.enviarMensagem({
                    texto: `Tempo de Entrega\n\nPrévias (seleta): 24-48 horas\nEntrega parcial (50%): 7-10 dias\nEntrega final (100%): 20-30 dias\n\nTodas as fotos recebem edição profissional. Acompanhamento pela galeria privada.`,
                    tipo: 'bot'
                });
                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'agendar', label: 'Vou agendar' },
                        { id: 'menu', label: 'Voltar' }
                    ], { comHumano: true });
                }, 500);
            }

            responderCancelamento() {
                this.enviarMensagem({
                    texto: `Política de Cancelamento\n\nAté 24h antes: reembolso total\nMenos de 24h: multa de 30-50%\n\nOpções de reembolso: crédito no cartão (5-7 dias), PIX (2-3 dias) ou crédito para futuro agendamento.\n\nVocê pode reagendar sem multa avisando com antecedência.`,
                    tipo: 'bot'
                });
                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'agendar', label: 'Agendar' },
                        { id: 'menu', label: 'Menu' }
                    ], { comHumano: true });
                }, 500);
            }

            ofrecerAgendamento() {
                this.enviarMensagem({
                    texto: `Perfeito!\n\nPara agendar seu ensaio, clique no botão abaixo e preencha o formulário rápido.`,
                    tipo: 'bot'
                });
                setTimeout(() => {
                    const params = new URLSearchParams();
                    if (this.tipoEnsaioEscolhido) params.set('ensaio', this.tipoEnsaioEscolhido);
                    const link = params.toString() ? `form.html?${params.toString()}` : 'form.html';

                    this.mostrarOpcoes([
                        { id: 'go_form', label: '→ Ir para o formulário', link },
                        { id: 'menu', label: 'Mais dúvidas' }
                    ], { comHumano: true });
                }, 500);
            }

            responderDuvida(entrada) {
                this.perguntaOriginal = entrada;
                this.mostrarIndicadorDigitacao();

                setTimeout(() => {
                    this.apagarIndicadorDigitacao();

                    this.enviarMensagem({
                        texto: `Não tenho essa resposta pronta aqui.\n\nMe deixa seu nome e um contato que nossa equipe te responde em até 2 horas.`,
                        tipo: 'bot'
                    });

                    setTimeout(() => this.mostrarFormularioContato(), 400);
                }, 1200);
            }

            /**
             * Formulário de captura de contato — grava no Supabase para que
             * a promessa de resposta em 2h realmente chegue a alguém.
             */
            mostrarFormularioContato() {
                this.aguardandoContato = true;
                const container = document.getElementById('chatMessages');
                const div = document.createElement('div');
                div.className = 'contact-form';
                div.id = 'contactFormBox';
                div.innerHTML = `
                    <label>Nome</label>
                    <input type="text" id="cfNome" placeholder="Seu nome">
                    <label>Telefone ou e-mail</label>
                    <input type="text" id="cfContato" placeholder="(00) 00000-0000 ou e-mail">
                    <div class="erro" id="cfErro" style="display:none;"></div>
                    <button onclick="chatbot.enviarContato()">Enviar</button>
                `;
                container.appendChild(div);
                this.scrollParaFinal();
            }

            async enviarContato() {
                const nome = document.getElementById('cfNome').value.trim();
                const contato = document.getElementById('cfContato').value.trim();
                const erroEl = document.getElementById('cfErro');

                if (!nome || !contato) {
                    erroEl.textContent = 'Preencha nome e um contato (telefone ou e-mail).';
                    erroEl.style.display = 'block';
                    return;
                }

                const registro = {
                    nome,
                    contato,
                    pergunta: this.perguntaOriginal || null,
                    origem: 'chatbot',
                    criado_em: new Date().toISOString()
                };

                let salvo = false;
                if (supabaseClient) {
                    try {
                        const { error } = await supabaseClient.from('contatos_chatbot').insert([registro]);
                        salvo = !error;
                        if (error) console.error('Erro ao salvar contato:', error);
                    } catch (err) {
                        console.error('Erro ao salvar contato:', err);
                    }
                }

                document.getElementById('contactFormBox').remove();
                this.aguardandoContato = false;

                this.enviarMensagem({
                    texto: salvo
                        ? `Obrigado, ${nome}! Recebemos seus dados — nossa equipe entra em contato em até 2 horas.`
                        : `Obrigado, ${nome}! Anotei seus dados aqui, mas se puder, chame também no WhatsApp para garantir uma resposta rápida.`,
                    tipo: 'bot'
                });

                setTimeout(() => {
                    this.mostrarOpcoes([
                        { id: 'agendar', label: 'Agendar' },
                        { id: 'menu', label: 'Menu' }
                    ], { comHumano: true });
                }, 500);
            }

            /**
             * UI Helpers
             */
            enviarMensagem(msg) {
                this.mensagens.push({ ...msg, timestamp: new Date() });
                this.salvarHistorico();
                this.renderizar();
            }

            mostrarOpcoes(opcoes, config) {
                config = config || {};
                const container = document.getElementById('chatMessages');
                const wrap = document.createElement('div');
                wrap.className = 'quick-replies-wrap';

                opcoes.forEach(op => {
                    const btn = document.createElement('button');
                    btn.className = 'quick-reply-btn';
                    btn.textContent = op.label;
                    btn.onclick = () => this.selecionarOpcao(op.id, op.label, op.link || '');
                    wrap.appendChild(btn);
                });

                if (config.comHumano) {
                    const btnHumano = document.createElement('button');
                    btnHumano.className = 'quick-reply-btn human';
                    btnHumano.textContent = 'Falar com um humano no WhatsApp';
                    btnHumano.onclick = () => window.open('https://wa.me/5585999999999', '_blank');
                    wrap.appendChild(btnHumano);
                }

                container.appendChild(wrap);
                this.scrollParaFinal();
            }

            mostrarOpcaoHumanoFixa() {
                // usado quando retomamos uma conversa já em andamento,
                // garante que o botão de humano sempre reapareça
                this.mostrarOpcoes([
                    { id: 'menu', label: 'Ver menu principal' }
                ], { comHumano: true });
            }

            mostrarIndicadorDigitacao() {
                const div = document.createElement('div');
                div.className = 'message bot';
                div.innerHTML = `
                    <div class="typing-indicator" id="typingIndicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
                document.getElementById('chatMessages').appendChild(div);
                this.scrollParaFinal();
            }

            apagarIndicadorDigitacao() {
                const indicator = document.getElementById('typingIndicator');
                if (indicator) indicator.closest('.message').remove();
            }

            selecionarOpcao(id, label, link) {
                document.querySelectorAll('.quick-replies-wrap').forEach(el => el.remove());

                if (link && link.startsWith('http')) {
                    window.open(link, '_blank');
                    return;
                }
                if (link && (link.includes('.html'))) {
                    window.location.href = link;
                    return;
                }
                if (id === 'menu') {
                    this.enviarMensagem({ texto: label, tipo: 'usuario' });
                    setTimeout(() => {
                        this.enviarMensagem({ texto: 'Com o que posso ajudar?', tipo: 'bot' });
                        setTimeout(() => {
                            this.mostrarOpcoes([
                                { id: 'info', label: 'Saber mais sobre nossos serviços' },
                                { id: 'valores', label: 'Conhecer valores' },
                                { id: 'agendar', label: 'Agendar agora' },
                                { id: 'faq', label: 'Dúvidas frequentes' }
                            ], { comHumano: true });
                        }, 500);
                    }, 600);
                    return;
                }

                this.processarResposta(label);
            }

            /**
             * Storage
             */
            salvarHistorico() {
                localStorage.setItem('chatHistorico', JSON.stringify(this.mensagens));
            }

            carregarHistorico() {
                const saved = localStorage.getItem('chatHistorico');
                this.mensagens = saved ? JSON.parse(saved) : [];
            }

            /**
             * Renderização
             */
            renderizar() {
                const container = document.getElementById('chatMessages');
                container.innerHTML = '';

                this.mensagens.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.tipo}`;
                    const hora = new Date(msg.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    div.innerHTML = `
                        <div class="message-content">${this.escapeHtml(msg.texto)}</div>
                        <div class="message-time">${hora}</div>
                    `;
                    container.appendChild(div);
                });

                this.scrollParaFinal();
            }

            scrollParaFinal() {
                const container = document.getElementById('chatMessages');
                container.scrollTop = container.scrollHeight;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML.replace(/\n/g, '<br>');
            }
        }

        const chatbot = new ChatbotMotazt();

        function enviarMensagem() {
            const input = document.getElementById('inputMsg');
            const texto = input.value.trim();
            if (texto) {
                chatbot.processarResposta(texto);
                input.value = '';
            }
        }

        function enviarSeEnter(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                enviarMensagem();
            }
        }

        function fecharChat() {
            if (confirm('Fechar chat?')) {
                window.close();
            }
        }

        // Atualiza o status online/offline periodicamente
        setInterval(atualizarStatusOnline, 60000);

        window.addEventListener('DOMContentLoaded', () => {
            chatbot.iniciar();
        });
    </script>
</body>
</html>
